# KOM USA — Netlify configuration (repo root).
#
# The Astro app lives in the `site/` subdirectory, so `base` points Netlify
# there. `command` and `publish` are resolved relative to `base`, i.e. the
# build runs in `site/` and publishes `site/dist`. This is what makes a freshly
# connected Netlify site build correctly without setting a base directory by
# hand in the UI.

[build]
  base = "site"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Hashed, content-addressed assets never change under a given name.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # PRE-LAUNCH: keep the site out of Google/Bing while it is not ready.
    # noindex tells search engines not to index any page; crawling stays
    # allowed so they can actually read this directive (do NOT also Disallow
    # in robots.txt, or they can't see the noindex).
    # ⚠️ LAUNCH CHECKLIST: delete the next line before going live.
    X-Robots-Tag = "noindex, nofollow"
