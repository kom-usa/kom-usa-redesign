# Temporary production configuration for the public coming-soon branch.
#
# The full Astro application remains on `main`. This branch publishes only the
# small static directory below, so unfinished pages and application code can
# continue to change without becoming publicly reachable at kom-usa.com.

[build]
  command = "echo 'KOM USA coming-soon site is static; no build required.'"
  publish = "coming-soon"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
