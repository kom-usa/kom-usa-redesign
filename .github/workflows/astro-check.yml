name: Astro Check

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: site

jobs:
  check:
    name: astro check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npx astro check
