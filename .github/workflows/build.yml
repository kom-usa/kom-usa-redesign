name: Build

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: site

jobs:
  build:
    name: astro build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build
