<!-- @dsCard group="Website" viewport="1200x800" name="KOM USA Website" subtitle="Homepage, Services, About, Contact — click-through" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KOM USA — Website UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; }
  #kit-tabs { position: sticky; top: 0; z-index: 20; display: flex; gap: 4px; padding: 10px 16px; background: var(--kom-charcoal); }
  #kit-tabs button { font-family: var(--font-main); font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: var(--radius-sm); border: none; background: transparent; color: rgba(255,255,255,0.65); cursor: pointer; }
  #kit-tabs button.active { background: var(--kom-green-dark); color: #fff; }
</style>
</head>
<body>
<div id="kit-tabs">
  <button data-p="home">Home</button>
  <button data-p="services">Services</button>
  <button data-p="about">About</button>
  <button data-p="contact">Contact</button>
</div>
<div id="root"></div>

<script type="text/babel" src="./Photo.jsx"></script>
<script type="text/babel" src="./Logo.jsx"></script>
<script type="text/babel" src="./HomePage.jsx"></script>
<script type="text/babel" src="./ServicesPage.jsx"></script>
<script type="text/babel" src="./AboutPage.jsx"></script>
<script type="text/babel" src="./ContactPage.jsx"></script>
<script type="text/babel">
  // Wait a tick for the babel-transpiled sibling scripts (loaded via src) to register.
  window.addEventListener("DOMContentLoaded", () => {
    const wait = setInterval(() => {
      if (window.HomePage && window.ServicesPage && window.AboutPage && window.ContactPage && window.Photo && window.Logo) {
        clearInterval(wait);
        window.__komSite = { Photo: window.Photo, Logo: window.Logo };
        boot();
      }
    }, 30);
  });

  function boot() {
    function App() {
      const [page, setPage] = React.useState("home");
      React.useEffect(() => {
        document.querySelectorAll("#kit-tabs button").forEach((b) => {
          b.classList.toggle("active", b.dataset.p === page);
          b.onclick = () => setPage(b.dataset.p);
        });
      }, [page]);
      const pages = {
        home: <window.HomePage nav={setPage} />,
        services: <window.ServicesPage nav={setPage} />,
        about: <window.AboutPage nav={setPage} />,
        contact: <window.ContactPage nav={setPage} />,
      };
      return pages[page];
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }
</script>
</body>
</html>
