<!-- @dsCard group="Colors" viewport="700x150" name="Accent & Semantic" subtitle="Brass gold accent; semantic surface/text aliases" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-main);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);padding:14px;min-height:80px;display:flex;flex-direction:column;justify-content:space-between;}
  .name{font-weight:700;font-size:13px;}
  .hex{font-size:11px;opacity:.85;}
</style>
<div class="row">
  <div class="sw" style="background:var(--kom-brass);color:#fff;">
    <div class="name">Brass Gold</div><div class="hex">#C59A42 — premium highlights, ratings</div>
  </div>
  <div class="sw" style="background:var(--surface-accent-soft);color:var(--kom-charcoal);border:1px solid var(--border-default);">
    <div class="name">surface-accent-soft</div><div class="hex">green-tinted section bg</div>
  </div>
  <div class="sw" style="background:var(--surface-inverse);color:var(--text-inverse);">
    <div class="name">surface-inverse / text-inverse</div><div class="hex">dark section</div>
  </div>
  <div class="sw" style="background:#fff;color:var(--text-link);border:1px solid var(--border-default);">
    <div class="name">text-link</div><div class="hex">Field Green underline on hover</div>
  </div>
</div>
