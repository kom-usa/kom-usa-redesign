<!-- @dsCard group="Colors" viewport="700x210" name="Primary & Action" subtitle="Sage green accent, Field green for CTAs" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-main);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);padding:14px;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;}
  .name{font-weight:700;font-size:14px;}
  .hex{font-size:12px;opacity:.85;}
</style>
<div class="row">
  <div class="sw" style="background:var(--kom-green);color:var(--kom-charcoal);">
    <div class="name">KOM Sage Green</div><div class="hex">#78A866 — accents, soft backgrounds</div>
  </div>
  <div class="sw" style="background:var(--kom-green-dark);color:#fff;">
    <div class="name">KOM Field Green</div><div class="hex">#2F6B3B — buttons, links, CTAs</div>
  </div>
  <div class="sw" style="background:var(--kom-green-dark-hover);color:#fff;">
    <div class="name">Field Green — hover</div><div class="hex">derived, oklch darken</div>
  </div>
  <div class="sw" style="background:var(--kom-green-dark-press);color:#fff;">
    <div class="name">Field Green — press</div><div class="hex">derived, oklch darken</div>
  </div>
</div>
