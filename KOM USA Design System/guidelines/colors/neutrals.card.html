<!-- @dsCard group="Colors" viewport="700x210" name="Neutrals" subtitle="Charcoal, warm white, concrete, steel" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-main);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);padding:14px;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-default);}
  .name{font-weight:700;font-size:14px;}
  .hex{font-size:12px;opacity:.85;}
</style>
<div class="row">
  <div class="sw" style="background:var(--kom-charcoal);color:#fff;border:none;">
    <div class="name">Graphite Charcoal</div><div class="hex">#33383E — logo, headings, nav</div>
  </div>
  <div class="sw" style="background:var(--kom-warm-white);color:var(--kom-charcoal);">
    <div class="name">Warm White</div><div class="hex">#F7F7F2 — page background</div>
  </div>
  <div class="sw" style="background:var(--kom-concrete);color:var(--kom-charcoal);">
    <div class="name">Concrete Gray</div><div class="hex">#E6E3DA — borders, dividers, forms</div>
  </div>
  <div class="sw" style="background:var(--kom-steel);color:#fff;">
    <div class="name">Steel Blue Gray</div><div class="hex">#5E7480 — icons, secondary accents</div>
  </div>
</div>
