# KOM USA — Netlify configuration
# If this repo's root is the parent folder (with the design system), set
# "Base directory" to `site` in the Netlify UI or add `base = "site"` here.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Branch "preview" renders server-side with Storyblok draft content for the
# visual editor. Never index it.
[context."preview".environment]
  STORYBLOK_PREVIEW = "true"

[context."preview"]
  command = "npm run build"
